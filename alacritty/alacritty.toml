[terminal.shell]
program = "/usr/bin/zsh"

[font]
size = 11

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[window]
padding.x = 8
padding.y = 8
decorations = "none"
opacity = 0.98

[cursor]
style.shape = "Block"

[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.normal]
black =   "#15161e"
red =     "#f7768e"
green =   "#9ece6a"
yellow =  "#e0af68"
blue =    "#7aa2f7"
magenta = "#bb9af7"
cyan =    "#7dcfff"
white =   "#a9b1d9"

[colors.bright]
black =   "#414868"
red =     "#f7768e"
green =   "#9ece6a"
yellow =  "#e0af68"
blue =    "#7aa2f7"
magenta = "#bb9af7"
cyan =    "#7dcfff"
white =   "#c0caf5"
